model:
  base_learning_rate: 1.0e-05
  target: ldm.models.diffusion.ddpm.DDPM
  params:
    linear_start: 0.0001
    linear_end: 0.02
    timesteps: 1000
    loss_type: l2
    first_stage_key: image
    image_size: 256
    channels: 4
    log_every_t: 200
    unet_config:
      target: ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 256
        in_channels: 4
        out_channels: 4
        model_channels: 128
        attention_resolutions:
        - 16
        - 8
        num_res_blocks: 2
        channel_mult:
        - 1
        - 2
        - 3
        - 4
        num_head_channels: 32
data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 4
    wrap: false
    train:
      target: ldm.data.mask_image_pair.MaskImagePairDataset
      params:
        root: dataset/borner
        split: train
        size: 256
    validation:
      target: ldm.data.mask_image_pair.MaskImagePairDataset
      params:
        root: dataset/borner
        split: val
        size: 256
