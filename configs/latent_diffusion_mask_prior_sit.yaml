model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.mask_prior_trainer.MaskPriorTrainer
  params:
    # Main project-layer p(semantic_mask) diffusion baseline with a SiT-style transformer backbone.
    #
    # Route contract:
    # - task: unconditional semantic_mask generation
    # - no mask tokenizer
    # - no image branch
    # - no external spatial condition
    # - direct K-channel semantic-mask field with argmax decode
    objective_name: diffusion
    monitor: val/base_error_mean
    semantic_mask_label_spec_path: configs/label_specs/remote_semantic.yaml
    mask_spatial_shape: [256, 256]
    log_sample_nfe: 8
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_sit.LatentIntervalSiT
      params:
        input_size: [256, 256]
        patch_size: 8
        hidden_size: 384
        depth: 12
        num_heads: 6
        mlp_ratio: 4.0
        time_conditioning: t
        time_embed_dim: 256
    objective_config:
      target: latent_meanflow.objectives.diffusion.GaussianDiffusionObjective
      params:
        num_train_steps: 1000
        beta_schedule: cosine
        cosine_s: 0.008
        loss_type: mse
        min_snr_gamma: 5.0
    sampler_config:
      target: latent_meanflow.samplers.diffusion.DDIMDiffusionSampler
      params:
        num_train_steps: 1000
        beta_schedule: cosine
        cosine_s: 0.008
        default_nfe: 8
        eta: 0.0
        clip_denoised: true
        clip_min: 0.0
        clip_max: 1.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: train
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: val
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 300
    num_sanity_val_steps: 0
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
