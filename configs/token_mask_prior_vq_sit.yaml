model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.token_mask_prior_trainer.TokenMaskPriorTrainer
  params:
    # Main project-layer p(code_indices) baseline on top of the frozen balanced discrete VQ tokenizer.
    #
    # Route contract:
    # - task: unconditional tokenizer-code generation
    # - state object: discrete tokenizer code indices with an absorbing MASK token
    # - frozen tokenizer decode converts sampled code grids back into semantic_mask
    # - downstream p(image | semantic_mask) renderer stays frozen infrastructure
    objective_name: discrete_mask_diffusion
    monitor: val/base_error_mean
    tokenizer_config_path: configs/semantic_mask_vq_tokenizer_main_balanced_256.yaml
    tokenizer_ckpt_path: null
    freeze_tokenizer: true
    tokenizer_sample_posterior: false
    log_sample_nfe: 8
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_sit.LatentIntervalSiT
      params:
        input_size: [64, 64]
        patch_size: 2
        hidden_size: 384
        depth: 12
        num_heads: 6
        mlp_ratio: 4.0
        time_conditioning: t
        time_embed_dim: 256
    objective_config:
      target: latent_meanflow.objectives.discrete_mask_diffusion.DiscreteMaskDiffusionObjective
      params:
        time_eps: 1.0e-3
        loss_type: cross_entropy
        mask_schedule: linear
        min_mask_ratio: 0.0
        max_mask_ratio: 1.0
    sampler_config:
      target: latent_meanflow.samplers.discrete_mask_diffusion.SeededDiscreteMaskDiffusionSampler
      params:
        default_nfe: 8
        mask_schedule: linear
        min_mask_ratio: 0.0
        max_mask_ratio: 1.0
        reveal_noise_scale: 0.15
        sample_temperature: 1.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: train
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: val
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 300
    num_sanity_val_steps: 0
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
