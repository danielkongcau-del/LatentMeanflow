model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.latent_fm_trainer.LatentFMTrainer
  params:
    tokenizer_config_path: configs/autoencoder_semantic_pair_256.yaml
    tokenizer_ckpt_path: logs/autoencoder/checkpoints/last.ckpt
    sample_posterior: false
    freeze_tokenizer: true
    use_class_condition: false
    class_label_key: class_label
    log_sample_steps: 16
    backbone_config:
      target: latent_meanflow.models.backbones.latent_velocity_convnet.LatentVelocityConvNet
      params:
        model_channels: 128
        time_embed_dim: 256
        num_res_blocks: 4
        dropout: 0.0
    objective_config:
      target: latent_meanflow.objectives.flow_matching.RectifiedFlowMatchingObjective
      params:
        time_eps: 1.0e-4
        loss_type: mse
        time_sampler_config:
          target: latent_meanflow.objectives.common.UniformTimeSampler
          params:
            time_eps: 1.0e-4

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: true
    strategy: ddp_find_unused_parameters_false
