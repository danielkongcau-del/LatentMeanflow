model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.mask_conditioned_image_trainer.MaskConditionedLatentFlowTrainer
  params:
    # Project-layer p(image | semantic mask) MeanFlow baseline.
    #
    # This route reuses the checked-in MeanFlow objective and U-Net family but
    # moves the task to conditional image rendering:
    # - image-only tokenizer
    # - external one-hot semantic mask condition
    # - no semantic mask encoded into latent z
    objective_name: meanflow
    tokenizer_config_path: configs/autoencoder_image_256.yaml
    tokenizer_ckpt_path: logs/autoencoder_image/checkpoints/last.ckpt
    sample_posterior: false
    freeze_tokenizer: true
    log_sample_nfe: 4
    monitor: val/base_error_mean
    mask_condition_key: mask_onehot
    mask_index_key: mask_index
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_unet.LatentIntervalUNet
      params:
        model_channels: 64
        time_embed_dim: 256
        num_res_blocks: 2
        channel_mult: [1, 2, 4]
        attention_resolutions: [4]
        dropout: 0.0
        num_heads: 4
        num_head_channels: 32
        use_scale_shift_norm: true
        resblock_updown: true
        time_conditioning: t_delta
        spatial_condition_channels: 7
    objective_config:
      target: latent_meanflow.objectives.meanflow.MeanFlowObjective
      params:
        time_eps: 1.0e-4
        min_delta: 0.0
        loss_type: mse
        border_fm_ratio: 0.75
        weighting_mode: paper_like
        adaptive_weight_power: 1.0
        adaptive_weight_bias: 1.0e-4
        time_sampler_config:
          target: latent_meanflow.objectives.common.LogitNormalTimeSampler
          params:
            loc: -0.4
            scale: 1.0
            time_eps: 1.0e-4
    sampler_config:
      target: latent_meanflow.samplers.interval.IntervalFlowSampler
      params:
        default_nfe: 1
        two_step_time: 0.5

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    num_sanity_val_steps: 0
    strategy: ddp_find_unused_parameters_false
