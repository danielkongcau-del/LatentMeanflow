model:
  base_learning_rate: 4.5e-6
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    monitor: "val/rec_loss"
    embed_dim: 4
    lossconfig:
      target: ldm.modules.losses.contperceptual.LPIPSWithDiscriminator
      params:
        disc_start: 50001
        kl_weight: 1.0e-6
        disc_weight: 0.5
        perceptual_weight: 0.0
        disc_in_channels: 4
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 4
      out_ch: 4
      ch: 128
      ch_mult: [1, 2, 4]
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 20
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.mask_image_pair.MultiMaskImagePairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
    validation:
      target: latent_meanflow.data.mask_image_pair.MultiMaskImagePairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks

lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        disabled: true
        batch_frequency: 50
        latest_only: true
        save_pairs: true
  trainer:
    benchmark: true
