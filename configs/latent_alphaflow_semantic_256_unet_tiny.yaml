model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.latent_flow_trainer.LatentFlowTrainer
  params:
    # Debug-first U-Net AlphaFlow pilot.
    #
    # This is the quickest real-data correctness check for the promoted U-Net
    # AlphaFlow route:
    # - same paired image-mask task
    # - same U-Net family as the real runs
    # - tiny width and short horizon so training instability shows up fast
    #
    # With the checked-in assumptions this uses:
    # - per-device batch size = 2
    # - accumulate_grad_batches = 1
    # - effective batch size = 4 on 2 GPUs
    #
    # This is a tiny/debug config, not a quality target.
    objective_name: alphaflow
    tokenizer_config_path: configs/autoencoder_semantic_pair_256.yaml
    tokenizer_ckpt_path: logs/autoencoder/checkpoints/last.ckpt
    sample_posterior: false
    freeze_tokenizer: true
    use_class_condition: false
    class_label_key: class_label
    log_sample_nfe: 2
    monitor: val/base_error_mean
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_unet.LatentIntervalUNet
      params:
        model_channels: 32
        time_embed_dim: 128
        num_res_blocks: 1
        channel_mult: [1, 2, 4]
        attention_resolutions: [4]
        dropout: 0.0
        num_heads: 4
        num_head_channels: 32
        use_scale_shift_norm: true
        resblock_updown: true
        time_conditioning: t_delta
    objective_config:
      target: latent_meanflow.objectives.alphaflow.AlphaFlowObjective
      params:
        time_eps: 1.0e-4
        min_delta: 0.0
        loss_type: mse
        trajectory_fm_ratio: 0.0
        border_fm_ratio: 0.25
        weighting_mode: alpha_adaptive_exact
        adaptive_weight_power: 1.0
        adaptive_weight_bias: 1.0e-4
        time_sampler_config:
          target: latent_meanflow.objectives.common.UniformTimeSampler
          params:
            time_eps: 1.0e-4
        alpha_schedule_config:
          target: latent_meanflow.objectives.alphaflow.BudgetSigmoidAlphaScheduler
          params:
            # Keep the smoke route simple: transition over the full tiny run
            # with the same project-layer scheduler interface used by the real
            # U-Net AlphaFlow configs.
            transition_start_fraction: 0.0
            transition_end_fraction: 1.0
            gamma: 12.0
            clamp_eta: 0.10
            total_epochs: 5
            optimizer_steps_per_epoch: 32
    sampler_config:
      target: latent_meanflow.samplers.interval.IntervalFlowSampler
      params:
        default_nfe: 1
        two_step_time: 0.5

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 10
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 5
    limit_train_batches: 32
    limit_val_batches: 4
    num_sanity_val_steps: 0
    log_every_n_steps: 1
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
