model:
  base_learning_rate: 5.0e-5
  target: latent_meanflow.models.semantic_mask_vq_autoencoder.SemanticMaskVQAutoencoder
  params:
    # More aggressively compressed semantic-mask VQ tokenizer for prior training.
    # This keeps the stabilized balanced VQ route but pushes 256x256 masks down to
    # a 16x16 code grid so MaskGIT-style priors do not have to model 4096 tokens.
    monitor: "val/mask_ce_unweighted"
    embed_dim: 32
    codebook_size: 512
    num_classes: 7
    quantizer_config:
      distance_metric: cosine
      use_ema_update: true
      ema_decay: 0.99
      ema_eps: 1.0e-5
      dead_code_threshold: 2.0
    lossconfig:
      target: latent_meanflow.models.semantic_mask_vq_autoencoder.SemanticMaskVQLoss
      params:
        mask_ce_weight: 1.0
        mask_dice_weight: 0.5
        mask_focal_weight: 0.0
        vq_codebook_weight: 1.0
        vq_commit_weight: 0.25
        ignore_index: -1
        focal_gamma: 2.0
        ce_label_smoothing: 0.0
        class_balance_mode: inverse_sqrt_frequency
    ddconfig:
      double_z: false
      z_channels: 16
      resolution: 256
      in_channels: 7
      out_ch: 7
      ch: 128
      ch_mult: [1, 2, 4, 4, 4]
      num_res_blocks: 2
      attn_resolutions: []
      use_linear_attn: true
      dropout: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: train
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: val
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    num_sanity_val_steps: 0
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
    strategy: ddp_find_unused_parameters_false
