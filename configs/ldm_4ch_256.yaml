model:
  base_learning_rate: 2.0e-6
  target: ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.0015
    linear_end: 0.0195
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    loss_type: l1
    first_stage_key: image
    cond_stage_key: class_label
    image_size: 64
    channels: 4
    cond_stage_trainable: false
    concat_mode: false
    conditioning_key: adm
    scale_by_std: true
    monitor: val/loss_simple_ema
    unet_config:
      target: ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 4
        out_channels: 4
        model_channels: 128
        num_classes: 4
        attention_resolutions:
          - 8
          - 4
          - 2
        num_res_blocks: 2
        channel_mult:
          - 1
          - 2
          - 3
          - 4
        num_head_channels: 32
    first_stage_config:
      target: ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        ckpt_path: null
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 4
          out_ch: 4
          ch: 128
          ch_mult: [1, 2, 4]
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity
    cond_stage_config:
      target: ldm.modules.encoders.modules.ClassLabeler
      params:
        key: class_label

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.mask_image_pair.MultiMaskImagePairDataset
      params:
        roots:
          - data/borner
          - data/corn
          - data/tomato
          - data/worm
        split: train
        size: 256
    validation:
      target: latent_meanflow.data.mask_image_pair.MultiMaskImagePairDataset
      params:
        roots:
          - data/borner
          - data/corn
          - data/tomato
          - data/worm
        split: val
        size: 256

lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        disabled: false
        batch_frequency: 50
        max_images: 32
        increase_log_steps: false
        latest_only: false
        save_pairs: true
        save_pairs_per_class: true
        pairs_per_class: 400
        num_classes: 4
        save_pairs_bases:
          - samples
        log_images_kwargs:
          plot_diffusion_rows: false
          plot_progressive_rows: false
          plot_denoise_rows: false
          inpaint: false
          return_keys:
            - samples_image
            - samples_mask
  trainer:
    benchmark: true
