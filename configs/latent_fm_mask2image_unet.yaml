model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.mask_conditioned_image_trainer.MaskConditionedLatentFMTrainer
  params:
    # Project-layer p(image | semantic mask) FM baseline.
    #
    # This route keeps the latent FM math unchanged but changes the task from
    # paired joint generation to spatially conditioned image rendering:
    # - tokenizer is image-only
    # - latent z represents RGB image only
    # - semantic mask stays outside z and is injected as a spatial condition
    tokenizer_config_path: configs/autoencoder_image_256.yaml
    tokenizer_ckpt_path: logs/autoencoder_image/checkpoints/last.ckpt
    sample_posterior: false
    freeze_tokenizer: true
    mask_condition_key: mask_onehot
    mask_index_key: mask_index
    semantic_mask_label_spec_path: configs/label_specs/remote_semantic.yaml
    log_sample_steps: 8
    monitor: val/fm_loss
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_unet.LatentIntervalUNet
      params:
        model_channels: 64
        time_embed_dim: 256
        num_res_blocks: 2
        channel_mult: [1, 2, 4]
        attention_resolutions: [4]
        dropout: 0.0
        num_heads: 4
        num_head_channels: 32
        use_scale_shift_norm: true
        resblock_updown: true
        time_conditioning: t
        condition_mode: input_concat
    objective_config:
      target: latent_meanflow.objectives.flow_matching.RectifiedFlowMatchingObjective
      params:
        time_eps: 1.0e-4
        loss_type: mse
        time_sampler_config:
          target: latent_meanflow.objectives.common.UniformTimeSampler
          params:
            time_eps: 1.0e-4

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 8
    num_workers: 4
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 100
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    num_sanity_val_steps: 0
    strategy: ddp_find_unused_parameters_false
