model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.latent_flow_trainer.LatentFlowTrainer
  params:
    # Debug-only MeanFlow pilot config. This is not the paper-like config.
    objective_name: meanflow
    tokenizer_config_path: configs/autoencoder_semantic_pair_256.yaml
    tokenizer_ckpt_path: logs/autoencoder/checkpoints/last.ckpt
    sample_posterior: false
    freeze_tokenizer: true
    use_class_condition: false
    class_label_key: class_label
    log_sample_nfe: 2
    monitor: val/meanflow_loss
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_velocity_convnet.LatentIntervalVelocityConvNet
      params:
        model_channels: 64
        time_embed_dim: 128
        num_res_blocks: 2
        dropout: 0.0
        time_conditioning: t_delta
    objective_config:
      target: latent_meanflow.objectives.meanflow.MeanFlowObjective
      params:
        time_eps: 1.0e-4
        min_delta: 0.0
        loss_type: mse
        border_fm_ratio: 0.75
        weighting_mode: paper_like
        adaptive_weight_power: 1.0
        adaptive_weight_bias: 1.0e-4
        time_sampler_config:
          target: latent_meanflow.objectives.common.UniformTimeSampler
          params:
            time_eps: 1.0e-4
    sampler_config:
      target: latent_meanflow.samplers.interval.IntervalFlowSampler
      params:
        default_nfe: 1
        two_step_time: 0.5

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 10
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 3
    limit_train_batches: 32
    limit_val_batches: 4
    num_sanity_val_steps: 0
    log_every_n_steps: 1
    strategy: ddp_find_unused_parameters_false
