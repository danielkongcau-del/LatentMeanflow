model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.semantic_mask_latent_prior_trainer.SemanticMaskLatentPriorTrainer
  params:
    # Deliberate overfit diagnostic for frozen-tokenizer latent prior.
    # Train and validation both see the same fixed 4-mask bank on purpose.
    objective_name: diffusion
    monitor: val/base_error_mean
    tokenizer_config_path: configs/semantic_mask_tokenizer_mid_plus_256.yaml
    tokenizer_ckpt_path: null
    tokenizer_sample_posterior: false
    freeze_tokenizer: true
    log_sample_nfe: 8
    latent_normalization_config:
      mode: none
      std_floor: 1.0e-6
    backbone_config:
      target: latent_meanflow.models.backbones.latent_interval_sit.LatentIntervalSiT
      params:
        input_size: [64, 64]
        patch_size: 2
        hidden_size: 256
        depth: 8
        num_heads: 4
        mlp_ratio: 4.0
        time_conditioning: t
        time_embed_dim: 256
    objective_config:
      target: latent_meanflow.objectives.diffusion.GaussianDiffusionObjective
      params:
        num_train_steps: 1000
        beta_schedule: cosine
        cosine_s: 0.008
        loss_type: mse
        min_snr_gamma: 5.0
    sampler_config:
      target: latent_meanflow.samplers.diffusion.DDIMDiffusionSampler
      params:
        num_train_steps: 1000
        beta_schedule: cosine
        cosine_s: 0.008
        default_nfe: 8
        eta: 0.0
        clip_denoised: false

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.subset.FixedSubsetDataset
      params:
        first_n: 4
        dataset_config:
          target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
          params:
            roots:
              - outputs/segmentation_teacher_data/remote_semantic_indexed
            split: train
            size: 256
            mask_dir: masks
            gray_to_class_id: configs/label_specs/remote_semantic.yaml
            ignore_index: -1
    validation:
      target: latent_meanflow.data.subset.FixedSubsetDataset
      params:
        first_n: 4
        dataset_config:
          target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
          params:
            roots:
              - outputs/segmentation_teacher_data/remote_semantic_indexed
            split: train
            size: 256
            mask_dir: masks
            gray_to_class_id: configs/label_specs/remote_semantic.yaml
            ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 10
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_steps: 2000
    limit_val_batches: 1
    check_val_every_n_epoch: 10
    num_sanity_val_steps: 0
    log_every_n_steps: 1
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
