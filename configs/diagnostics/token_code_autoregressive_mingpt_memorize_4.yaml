model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.trainers.token_code_autoregressive_prior_trainer.TokenCodeAutoregressivePriorTrainer
  params:
    # Deliberate overfit diagnostic for the token-code autoregressive baseline on a fixed 4-mask bank.
    objective_name: token_code_autoregressive
    monitor: val/sampled_monitor_error
    tokenizer_config_path: configs/semantic_mask_vq_tokenizer_main_balanced_256.yaml
    tokenizer_ckpt_path: null
    freeze_tokenizer: true
    tokenizer_sample_posterior: false
    log_sample_nfe: 1
    sample_temperature: 1.0
    sample_top_k: null
    sample_greedy: true
    permuter_config:
      target: taming.modules.transformer.permuter.Identity
    backbone_config:
      target: latent_meanflow.models.backbones.token_code_mingpt.TokenCodeMingptBackbone
      params:
        block_size: 256
        n_layer: 6
        n_head: 4
        n_embd: 128
        embd_pdrop: 0.0
        resid_pdrop: 0.0
        attn_pdrop: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.subset.FixedSubsetDataset
      params:
        first_n: 4
        dataset_config:
          target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
          params:
            roots:
              - outputs/segmentation_teacher_data/remote_semantic_indexed
            split: train
            size: 256
            mask_dir: masks
            gray_to_class_id: configs/label_specs/remote_semantic.yaml
            ignore_index: -1
    validation:
      target: latent_meanflow.data.subset.FixedSubsetDataset
      params:
        first_n: 4
        dataset_config:
          target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
          params:
            roots:
              - outputs/segmentation_teacher_data/remote_semantic_indexed
            split: train
            size: 256
            mask_dir: masks
            gray_to_class_id: configs/label_specs/remote_semantic.yaml
            ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 10
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_steps: 2500
    limit_val_batches: 1
    check_val_every_n_epoch: 25
    num_sanity_val_steps: 0
    log_every_n_steps: 1
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
