model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.models.semantic_mask_autoencoder.SemanticMaskAutoencoder
  params:
    # Debug-only tiny overfit config for the mask-only semantic tokenizer.
    monitor: "val/total_loss"
    embed_dim: 4
    num_classes: 7
    sample_posterior: true
    lossconfig:
      target: latent_meanflow.models.semantic_mask_autoencoder.SemanticMaskLoss
      params:
        mask_ce_weight: 1.0
        mask_dice_weight: 0.25
        mask_focal_weight: 0.0
        kl_weight: 1.0e-6
        ignore_index: -1
        focal_gamma: 2.0
        ce_label_smoothing: 0.0
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 7
      out_ch: 7
      ch: 64
      ch_mult: [1, 2, 2]
      num_res_blocks: 1
      attn_resolutions: []
      dropout: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: train
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_mask.MultiSemanticMaskDataset
      params:
        roots:
          - outputs/segmentation_teacher_data/remote_semantic_indexed
        split: val
        size: 256
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 10
        increase_log_steps: false
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 120
    limit_train_batches: 32
    limit_val_batches: 4
    num_sanity_val_steps: 0
    log_every_n_steps: 1
    accumulate_grad_batches: 1
    strategy: ddp_find_unused_parameters_false
