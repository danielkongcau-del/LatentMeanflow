model:
  base_learning_rate: 1.0e-4
  target: latent_meanflow.models.semantic_autoencoder.SemanticPairAutoencoder
  params:
    # Debug-only tiny overfit config for semantic tokenizer sanity checks.
    monitor: "val/total_loss"
    embed_dim: 4
    num_classes: 7
    sample_posterior: true
    lossconfig:
      target: latent_meanflow.models.semantic_autoencoder.SemanticPairLoss
      params:
        rgb_l1_weight: 1.0
        rgb_lpips_weight: 0.0
        mask_ce_weight: 1.0
        mask_dice_weight: 0.0
        mask_focal_weight: 0.0
        kl_weight: 1.0e-6
        ignore_index: -1
        focal_gamma: 2.0
        ce_label_smoothing: 0.0
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 10
      out_ch: 10
      ch: 64
      ch_mult: [1, 2]
      num_res_blocks: 1
      attn_resolutions: []
      dropout: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 2
    num_workers: 0
    wrap: false
    train:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: train
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1
    validation:
      target: latent_meanflow.data.semantic_pair.MultiSemanticImageMaskPairDataset
      params:
        roots:
          - data/remote
        split: val
        size: 256
        image_dir: images
        mask_dir: masks
        gray_to_class_id: configs/label_specs/remote_semantic.yaml
        ignore_index: -1

lightning:
  callbacks:
    image_logger:
      target: latent_meanflow.callbacks.semantic_logger.SemanticPairImageLogger
      params:
        disabled: false
        batch_frequency: 5
        max_images: 4
        latest_only: true
        ignore_index: -1
  trainer:
    benchmark: false
    max_epochs: 40
    overfit_batches: 2
    limit_val_batches: 1
    num_sanity_val_steps: 0
    log_every_n_steps: 1
